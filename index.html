<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2025 — Season Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     THEME VARIABLES
  ═══════════════════════════════════════════ */
  :root[data-theme="dark"] {
    --bg:           #0a0a0f;
    --panel:        #0f0f1a;
    --panel2:       #131320;
    --panel-hover:  rgba(232,0,29,0.06);
    --border:       rgba(255,255,255,0.07);
    --border2:      rgba(255,255,255,0.04);
    --text:         #f0f0f5;
    --text2:        #c8c8d8;
    --muted:        #7777aa;
    --track-stroke: #e8001d;
    --track-glow:   rgba(232,0,29,0.25);
    --header-bg:    linear-gradient(135deg, #0d0d18 0%, #1a0a10 60%, #0d0d18 100%);
    --sidebar-bg:   #0f0f1a;
    --sidebar-sticky:#0f0f1a;
    --fact-bg:      #0f0f1a;
    --session-bg:   #0f0f1a;
    --session-head: rgba(255,255,255,0.02);
    --podium-bg:    transparent;
    --toggle-bg:    rgba(255,255,255,0.08);
    --toggle-icon:  '☀️';
    --input-bg:     rgba(255,255,255,0.05);
    --accent:       #00d2ff;
    --race-header-bg: linear-gradient(90deg, rgba(232,0,29,0.12) 0%, transparent 100%);
    --loc-bg:       rgba(255,255,255,0.03);
    --track-img-filter: invert(1) hue-rotate(180deg) brightness(0.85);
  }

  :root[data-theme="light"] {
    --bg:           #e8e8ee;
    --panel:        #f0f0f6;
    --panel2:       #e0e0e8;
    --panel-hover:  rgba(232,0,29,0.05);
    --border:       rgba(0,0,0,0.1);
    --border2:      rgba(0,0,0,0.05);
    --text:         #111118;
    --text2:        #333344;
    --muted:        #666688;
    --track-stroke: #cc0018;
    --track-glow:   rgba(204,0,24,0.2);
    --header-bg:    linear-gradient(135deg, #1a1a28 0%, #2a0f18 60%, #1a1a28 100%);
    --sidebar-bg:   #f0f0f6;
    --sidebar-sticky:#f0f0f6;
    --fact-bg:      #f0f0f6;
    --session-bg:   #f0f0f6;
    --session-head: rgba(0,0,0,0.025);
    --podium-bg:    transparent;
    --toggle-bg:    rgba(0,0,0,0.08);
    --toggle-icon:  '🌙';
    --input-bg:     rgba(0,0,0,0.05);
    --accent:       #0088bb;
    --race-header-bg: linear-gradient(90deg, rgba(232,0,29,0.08) 0%, transparent 100%);
    --track-img-filter: none;
    --loc-bg:       rgba(0,0,0,0.03);
  }

  /* ═══════════════════════════════════════════
     BASE
  ═══════════════════════════════════════════ */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ═══════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════ */
  .header {
    background: var(--header-bg);
    border-bottom: 2px solid #e8001d;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .f1-mark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 30px;
    color: #e8001d;
    letter-spacing: -1px;
  }

  .season-badge {
    background: #e8001d;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 2px 8px;
    letter-spacing: 1px;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .champion-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,128,0,0.12);
    border: 1px solid rgba(255,128,0,0.4);
    padding: 6px 14px;
  }

  .champion-badge .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #ff8000;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .champion-badge .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #fff;
  }

  /* THEME TOGGLE */
  .theme-toggle {
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    background: rgba(232,0,29,0.15);
    border-color: rgba(232,0,29,0.4);
  }

  /* ═══════════════════════════════════════════
     LAYOUT
  ═══════════════════════════════════════════ */
  .layout {
    display: flex;
    height: calc(100vh - 64px);
  }

  /* ═══════════════════════════════════════════
     SIDEBAR
  ═══════════════════════════════════════════ */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #e8001d transparent;
    transition: background 0.3s;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--sidebar-sticky);
    z-index: 10;
    transition: background 0.3s;
  }

  .sidebar-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .race-search {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s, background 0.3s;
  }

  .race-search:focus { border-color: #e8001d; }

  .race-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid var(--border2);
  }

  .race-item:hover {
    background: var(--panel-hover);
    border-left-color: rgba(232,0,29,0.3);
  }

  .race-item.active {
    background: rgba(232,0,29,0.1);
    border-left-color: #e8001d;
  }

  .race-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
  }

  .race-flag { font-size: 17px; flex-shrink: 0; }

  .race-info { flex: 1; min-width: 0; }

  .race-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .race-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 1px;
  }

  .race-date-small {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .race-winner-small { font-size: 10px; font-weight: 600; }

  .sprint-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 8px;
    background: rgba(255,107,0,0.2);
    color: #ff6b00;
    padding: 1px 4px;
    letter-spacing: 0.5px;
  }

  /* ═══════════════════════════════════════════
     CONTENT
  ═══════════════════════════════════════════ */
  .content {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #e8001d transparent;
    padding: 24px 28px;
    transition: background 0.3s;
  }

  /* ═══════════════════════════════════════════
     RACE HEADER
  ═══════════════════════════════════════════ */
  .race-header {
    margin-bottom: 20px;
  }

  .round-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sprint-tag {
    display: inline-block;
    background: #ff6b00;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 9px;
    padding: 2px 6px;
    letter-spacing: 1px;
  }

  h1.race-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 38px;
    line-height: 1;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 2px;
  }

  .circuit-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ═══════════════════════════════════════════
     FACTS GRID
  ═══════════════════════════════════════════ */
  .facts-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .fact-card {
    background: var(--fact-bg);
    border: 1px solid var(--border);
    padding: 12px 14px;
    transition: background 0.3s;
  }

  .fact-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  .fact-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    line-height: 1.2;
  }

  .fact-value.mono {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
  }

  /* ═══════════════════════════════════════════
     RACE BODY
  ═══════════════════════════════════════════ */
  .race-body {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 16px;
    align-items: start;
  }

  /* ═══════════════════════════════════════════
     TRACK PANEL
  ═══════════════════════════════════════════ */
  .track-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 18px;
    position: sticky;
    top: 0;
    transition: background 0.3s;
  }

  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .track-svg-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 180px;
    padding: 8px;
    position: relative;
  }

  .track-svg-wrap svg {
    max-width: 100%;
    max-height: 220px;
    width: 100%;
    filter: drop-shadow(0 0 10px var(--track-glow));
    transition: filter 0.3s;
  }

  /* SVG strokes adapt to theme */
  [data-theme="light"] .track-svg-wrap svg path,
  [data-theme="light"] .track-svg-wrap svg polyline {
    stroke: #cc0018 !important;
  }

  .track-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .ts .k { color: var(--muted); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-family:'Share Tech Mono',monospace; }
  .ts .v { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text); }

  /* Location box */
  .loc-box {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .loc-inner {
    background: var(--loc-bg);
    border: 1px solid var(--border);
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .loc-flag { font-size: 26px; }

  .loc-city {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
  }

  .loc-coords {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ═══════════════════════════════════════════
     SESSIONS PANEL
  ═══════════════════════════════════════════ */
  .sessions-panel { display: flex; flex-direction: column; gap: 10px; }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 2px;
  }

  .section-divider .sd-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .sessions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .session-card {
    background: var(--session-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: background 0.3s;
  }

  .session-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: var(--session-head);
    border-bottom: 1px solid var(--border);
  }

  .sname {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .sname.sprint-color { color: #ff6b00; }

  .podium-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  .podium-entry {
    padding: 12px 14px;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .podium-entry:last-child { border-right: none; }

  .podium-entry::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .p1::before { background: #ffe4a0; }
  .p2::before { background: #e8894a; }
  .p3::before { background: #a04e38; }

  .pos-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 24px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .p1 .pos-num { color: #ffe4a0; }
  .p2 .pos-num { color: #e8894a; }
  .p3 .pos-num { color: #a04e38; }

  .driver-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    margin-bottom: 2px;
    color: var(--text);
  }

  .driver-team {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .driver-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .driver-gap {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .team-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .no-data {
    color: var(--muted);
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    padding: 14px;
    text-align: center;
  }

  /* P3 needs slight brightening on light backgrounds */
  [data-theme="light"] .p3 .pos-num,
  [data-theme="light"] .p3-label { color: #c06040; }

  /* WET SESSION BADGE */
  .wet-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(0, 140, 255, 0.15);
    border: 1px solid rgba(0, 140, 255, 0.4);
    color: #4db8ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 1px 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  [data-theme="light"] .wet-badge {
    background: rgba(0, 100, 200, 0.1);
    border-color: rgba(0, 100, 200, 0.3);
    color: #0055bb;
  }

  /* CIRCUIT HISTORY PANEL */
  .circuit-history {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .history-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .history-item .k {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .history-item .v {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    line-height: 1.2;
  }

  .history-item .v.accent { color: #e8001d; }

  .history-item.full {
    grid-column: 1 / -1;
  }

  /* ═══════════════════════════════════════════
     COMPARE VIEW
  ═══════════════════════════════════════════ */
  .layout-compare {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #e8001d transparent;
  }

  /* Headline banner */
  .compare-headline {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid #e8001d;
    padding: 20px 28px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .ch-main {
    flex: 1;
  }

  .ch-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .ch-delta {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 48px;
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .ch-delta .faster { color: #00c97a; }
  .ch-delta .slower { color: #e8001d; }
  .ch-delta .unit {
    font-size: 18px;
    font-weight: 400;
    color: var(--muted);
  }

  .ch-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Barlow', sans-serif;
  }

  /* Tug-of-war bar */
  .tug-bar-wrap {
    flex: 2;
    min-width: 260px;
  }

  .tug-label-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .tug-bar {
    height: 10px;
    background: var(--border);
    position: relative;
    display: flex;
  }

  .tug-left {
    background: #00c97a;
    height: 100%;
    transition: width 0.6s ease;
  }

  .tug-right {
    background: #e8001d;
    height: 100%;
    transition: width 0.6s ease;
  }

  .tug-centre {
    position: absolute;
    left: 50%;
    top: -3px;
    bottom: -3px;
    width: 2px;
    background: var(--text);
    transform: translateX(-50%);
  }

  .tug-counts {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    margin-top: 5px;
  }

  .tug-counts .faster-count { color: #00c97a; }
  .tug-counts .slower-count { color: #e8001d; }

  /* Circuit dot row */
  .circuit-dots-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
    padding: 14px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
  }

  .circuit-dot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .circuit-dot-wrap:hover { transform: scale(1.15); }

  .circuit-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .dot-faster  { background: #00c97a; box-shadow: 0 0 5px rgba(0,201,122,0.5); }
  .dot-slower  { background: #e8001d; box-shadow: 0 0 5px rgba(232,0,29,0.5); }
  .dot-invalid { background: #f5a623; opacity: 0.7; }
  .dot-pending { background: var(--border); border: 1px solid var(--muted); }

  .circuit-dot-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    color: var(--muted);
  }

  /* Sub-tabs within compare */
  .compare-subtabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .compare-subtab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }

  .compare-subtab:hover { color: var(--text); }
  .compare-subtab.active { color: var(--text); border-bottom-color: #e8001d; }

  .compare-panel { display: none; }
  .compare-panel.active { display: block; }

  /* Delta bar rows */
  .delta-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .delta-row {
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: background 0.15s;
    cursor: pointer;
  }

  .delta-row:hover { background: var(--panel-hover); }
  .delta-row.expanded { border-color: rgba(232,0,29,0.3); }

  .delta-row-main {
    display: grid;
    grid-template-columns: 28px 24px 160px 1fr 90px;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
  }

  @media (max-width: 900px) {
    .delta-row-main { grid-template-columns: 28px 20px 120px 1fr 70px; gap: 8px; }
  }

  .dr-round {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .dr-flag { font-size: 16px; }

  .dr-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* The delta bar itself */
  .delta-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .delta-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    position: relative;
  }

  /* Bar fills from centre */
  .delta-bar-fill {
    position: absolute;
    top: 0;
    height: 100%;
    transition: width 0.5s ease;
  }

  .delta-bar-fill.faster {
    right: 50%;
    background: linear-gradient(to left, #00c97a, #00a060);
  }

  .delta-bar-fill.slower {
    left: 50%;
    background: linear-gradient(to right, #e8001d, #b00018);
  }

  .delta-bar-fill.invalid {
    left: 50%;
    background: #f5a623;
    opacity: 0.4;
  }

  .delta-bar-centre {
    position: absolute;
    left: 50%;
    top: -2px;
    bottom: -2px;
    width: 1px;
    background: var(--muted);
    transform: translateX(-50%);
  }

  .delta-bar-fill.dashed {
    background-image: repeating-linear-gradient(
      90deg, #f5a623 0px, #f5a623 4px, transparent 4px, transparent 8px
    );
    background-color: transparent;
  }

  .dr-delta-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
    min-width: 70px;
  }

  .dr-delta-val.faster { color: #00c97a; }
  .dr-delta-val.slower { color: #e8001d; }
  .dr-delta-val.invalid { color: #f5a623; }
  .dr-delta-val.pending { color: var(--muted); }

  /* Expanded detail */
  .delta-row-detail {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .delta-row.expanded .delta-row-detail { display: block; }

  /* Pole comparison cards */
  .pole-compare-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: stretch;
    margin-bottom: 12px;
    padding-top: 12px;
  }

  .pole-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 12px 16px;
  }

  .pole-card.y2025 { border-top: 2px solid #ff8000; }
  .pole-card.y2026 { border-top: 2px solid #00c8ff; }

  .pc-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    margin-bottom: 6px;
  }

  .pc-year.y2025 { color: #ff8000; }
  .pc-year.y2026 { color: #00c8ff; }

  .pc-driver {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
    line-height: 1;
  }

  .pc-team {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin: 3px 0 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .pc-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: var(--accent);
  }

  .pc-conditions {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .pole-vs-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
  }

  .vs-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    color: var(--muted);
  }

  .vs-delta-big {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
  }

  .vs-delta-big.faster { color: #00c97a; }
  .vs-delta-big.slower { color: #e8001d; }
  .vs-delta-big.invalid { color: #f5a623; }

  /* Conditions validity badge */
  .conditions-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    margin-top: 10px;
  }

  .cond-valid   { background: rgba(0,201,122,0.1);  border: 1px solid rgba(0,201,122,0.35); color: #00c97a; }
  .cond-both-wet{ background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.35);color: #f5a623; }
  .cond-invalid { background: rgba(232,0,29,0.08);  border: 1px solid rgba(232,0,29,0.3);  color: #e8001d; }

  /* Session mini-bars */
  .session-mini-bars {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 10px;
  }

  .smb-row {
    display: grid;
    grid-template-columns: 60px 1fr 90px;
    align-items: center;
    gap: 8px;
  }

  .smb-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .smb-bar-track {
    height: 4px;
    background: var(--border);
    position: relative;
  }

  .smb-fill {
    position: absolute;
    top: 0; height: 100%;
    transition: width 0.4s ease;
  }

  .smb-fill.faster { right: 50%; background: #00c97a; }
  .smb-fill.slower { left: 50%; background: #e8001d; }
  .smb-centre { position: absolute; left: 50%; top: -1px; bottom: -1px; width: 1px; background: var(--muted); transform: translateX(-50%); }

  .smb-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    text-align: right;
  }

  .smb-val.faster { color: #00c97a; }
  .smb-val.slower { color: #e8001d; }
  .smb-val.na     { color: var(--muted); }

  /* Points sparkline panel */
  .sparkline-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 16px;
  }

  .sparkline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .sparkline-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .sparkline-legend {
    display: flex;
    gap: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
  }

  .sl-item { display: flex; align-items: center; gap: 6px; color: var(--text); }
  .sl-line { width: 20px; height: 3px; border-radius: 2px; }

  .sparkline-scroll {
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sparkline-team-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .stf-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    padding: 3px 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .stf-btn.active { color: #fff; }
  .stf-btn:hover { opacity: 0.8; }

  .sc-strip {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    background: rgba(255, 180, 0, 0.04);
  }

  .sc-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #f5a623;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    margin-right: 2px;
  }

  .sc-entry {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245, 166, 35, 0.1);
    border: 1px solid rgba(245, 166, 35, 0.3);
    padding: 2px 8px;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
  }

  .sc-laps { color: #f5a623; font-weight: 600; }
  .sc-reason { color: var(--muted); }

  [data-theme="light"] .sc-strip  { background: rgba(200, 130, 0, 0.04); }
  [data-theme="light"] .sc-entry  { background: rgba(200, 130, 0, 0.08); border-color: rgba(200, 130, 0, 0.25); }
  [data-theme="light"] .sc-label,
  [data-theme="light"] .sc-laps   { color: #b87800; }

  /* ═══════════════════════════════════════════
     RACE PODIUM FEATURE
  ═══════════════════════════════════════════ */
  .race-podium-special {
    background: var(--session-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: background 0.3s;
  }

  .race-podium-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: var(--race-header-bg);
    border-bottom: 1px solid var(--border);
  }

  .rph-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e8001d;
  }

  .race-winner-feature {
    display: grid;
    grid-template-columns: auto 1fr 1fr 1fr;
  }

  .rwf-pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    color: rgba(232,0,29,0.12);
    border-right: 1px solid var(--border);
  }

  .rwf-entry {
    padding: 14px 18px;
    border-right: 1px solid var(--border);
  }

  .rwf-entry:last-child { border-right: none; }

  .rwf-pos-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 24px;
    margin-bottom: 3px;
  }

  .p1-label { color: #ffe4a0; }
  .p2-label { color: #e8894a; }
  .p3-label { color: #a04e38; }

  .rwf-driver {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    line-height: 1;
    margin-bottom: 2px;
    color: var(--text);
  }

  .rwf-team {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .rwf-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  /* ═══════════════════════════════════════════
     SCROLLBARS
  ═══════════════════════════════════════════ */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e8001d; }

  /* ═══════════════════════════════════════════
     RESPONSIVE — comprehensive breakpoints
  ═══════════════════════════════════════════ */

  /* ── Tablet: 768–1099px ── */
  @media (max-width: 1099px) {
    .facts-grid          { grid-template-columns: repeat(3, 1fr); }
    .race-body           { grid-template-columns: 1fr; }
    .track-panel         { position: static; }
    .standings-grid      { grid-template-columns: 1fr; }
    .compare-headline    { flex-direction: column; gap: 16px; }
    .tug-bar-wrap        { width: 100%; }
    .pole-compare-grid   { grid-template-columns: 1fr; gap: 8px; }
    .pole-vs-col         { flex-direction: row; justify-content: center; padding: 6px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  }

  /* ── Small tablet / large mobile: 640–767px ── */
  @media (max-width: 767px) {
    /* Header */
    .header              { height: auto; min-height: 56px; padding: 8px 16px; flex-wrap: wrap; gap: 8px; }
    .header-left         { gap: 10px; }
    .f1-mark             { font-size: 24px; }
    .header-title        { display: none; }
    .champion-badge      { display: none; }
    .season-tabs         { order: 3; width: 100%; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 4px; }
    .season-tab          { flex: 1; padding: 6px 8px; min-width: 0; }
    .tab-year            { font-size: 14px; }
    .tab-sub             { font-size: 7px; }
    .header-right        { gap: 8px; }

    /* Layout — hide sidebar, make content full width */
    .layout              { height: calc(100vh - 88px); }
    .layout-compare      { height: calc(100vh - 88px); }
    .sidebar             { display: none; }
    .sidebar.open        { display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; width: 280px; z-index: 200; box-shadow: 4px 0 20px rgba(0,0,0,0.5); }

    /* Sidebar overlay */
    .sidebar-overlay     { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 199; }
    .sidebar-overlay.open{ display: block; }

    /* Mobile nav bar at bottom */
    .mobile-nav          { display: flex; }

    /* Facts */
    .facts-grid          { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .fact-value          { font-size: 13px; }

    /* Sessions */
    .sessions-grid       { grid-template-columns: 1fr; }
    .podium-row          { grid-template-columns: repeat(3, 1fr); }

    /* Race podium */
    .race-winner-feature { grid-template-columns: 1fr 1fr 1fr; }
    .rwf-pos             { display: none; }
    .rwf-driver          { font-size: 16px; }
    .rwf-time            { font-size: 11px; }

    /* Race title */
    h1.race-title        { font-size: 28px; }
    .circuit-name        { font-size: 14px; }
    .round-tag           { font-size: 9px; }

    /* Compare */
    .ch-delta            { font-size: 36px; }
    .delta-row-main      { grid-template-columns: 20px 20px 1fr 60px; gap: 8px; padding: 9px 12px; }
    .dr-round            { display: none; }
    .delta-row-main .dr-round { display: none; }

    /* Next race banner */
    .next-race-banner    { flex-direction: column; align-items: flex-start; gap: 12px; }
    .countdown-blocks    { margin-left: 0; }

    /* Sparkline */
    .sparkline-header    { flex-direction: column; align-items: flex-start; }

    /* Content padding */
    .content             { padding: 16px; }
  }

  /* ── Mobile: < 480px ── */
  @media (max-width: 479px) {
    .header              { padding: 6px 12px; }
    .content             { padding: 12px; }

    /* Facts: 2 col but smaller */
    .facts-grid          { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .fact-card           { padding: 9px 11px; }
    .fact-label          { font-size: 8px; }
    .fact-value          { font-size: 12px; }

    /* Sessions: single column, compact podium */
    .podium-entry        { padding: 9px 10px; }
    .pos-num             { font-size: 18px; }
    .driver-name         { font-size: 12px; }
    .driver-time         { font-size: 10px; }

    /* Race podium compact */
    .rwf-entry           { padding: 10px 12px; }
    .rwf-pos-label       { font-size: 18px; }
    .rwf-driver          { font-size: 14px; }
    .rwf-time            { font-size: 10px; }

    /* Title */
    h1.race-title        { font-size: 24px; }

    /* Compare delta row */
    .delta-row-main      { grid-template-columns: 20px 1fr 55px; padding: 8px 10px; }
    .dr-flag             { display: none; }

    /* Countdown */
    .cd-num              { font-size: 20px; }
    .cd-block            { padding: 5px 8px; min-width: 40px; }

    /* Circuit dots — smaller */
    .circuit-dot         { width: 10px; height: 10px; }
    .circuit-dots-row    { gap: 5px; padding: 10px 14px; }

    /* History grid */
    .history-grid        { grid-template-columns: 1fr; }

    /* SC strip */
    .sc-strip            { flex-direction: column; align-items: flex-start; }

    /* Session card header */
    .session-card-header { flex-wrap: wrap; gap: 4px; }

    /* Track panel */
    .track-panel         { padding: 14px; }
    .track-svg-wrap      { min-height: 140px; }
  }

  /* ── Mobile nav bar (hidden on desktop, shown on mobile) ── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    z-index: 150;
    align-items: stretch;
  }

  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    gap: 3px;
    transition: color 0.15s, background 0.15s;
    border-top: 2px solid transparent;
  }

  .mobile-nav-btn .mnb-icon { font-size: 18px; line-height: 1; }
  .mobile-nav-btn.active    { color: var(--text); border-top-color: #e8001d; }
  .mobile-nav-btn:hover     { background: rgba(232,0,29,0.06); }

  /* Adjust content bottom padding when mobile nav is visible */
  @media (max-width: 767px) {
    .content        { padding-bottom: 68px; }
    .layout         { height: calc(100vh - 88px); }
    .layout-compare { height: calc(100vh - 88px); }
  }

  /* ── Desktop large: ensure sidebar toggle button hidden ── */
  @media (min-width: 768px) {
    .mobile-nav       { display: none !important; }
    .sidebar-overlay  { display: none !important; }
    .sidebar          { display: flex !important; flex-direction: column; }
  }

  /* Placeholder for empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 50vh;
    gap: 12px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 40px; }
  .empty-state .msg {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════
     SEASON TABS
  ═══════════════════════════════════════════ */
  .season-tabs {
    display: flex;
    align-items: stretch;
    gap: 2px;
    height: 100%;
  }

  .season-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.2s;
    gap: 1px;
    min-width: 80px;
  }

  .season-tab:hover {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.8);
  }

  .season-tab.active {
    border-bottom-color: #e8001d;
    color: #fff;
    background: rgba(232,0,29,0.08);
  }

  .season-tab.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .tab-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    line-height: 1;
  }

  .tab-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ═══════════════════════════════════════════
     2026 LIVE VIEW
  ═══════════════════════════════════════════ */

  /* Live pulse indicator */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00e676;
    margin-right: 5px;

// Theme toggle handled below after selectRace is defined
let isDark = true;

// ═══════════════════════════════════════════════════════════════════════════
//  TRACK DATA — fetch ALL circuits from the single combined GeoJSON file
//  bacinger/f1-circuits — one file, all circuits, no CORS issues
// ═══════════════════════════════════════════════════════════════════════════

// Map race ID → circuit ID in the bacinger repo — all verified from f1-locations.json
const CIRCUIT_IDS = {
  1:  "au-1953",   // Albert Park ✓
  2:  "cn-2004",   // Shanghai ✓
  3:  "jp-1962",   // Suzuka ✓ (opened 1962, not 1987)
  4:  "bh-2002",   // Bahrain ✓ (opened 2002, not 2004)
  5:  "sa-2021",   // Jeddah ✓
  6:  "us-2022",   // Miami ✓ (opened 2022, not 2019)

// Single combined GeoJSON — one fetch gets all circuits
const ALL_CIRCUITS_URL = "https://cdn.jsdelivr.net/gh/bacinger/f1-circuits@master/f1-circuits.geojson";

let circuitMap = null; // populated on first load: { "au-1953": Feature, ... }

async function loadAllCircuits() {
  if (circuitMap) return circuitMap;
  try {
    const res = await fetch(ALL_CIRCUITS_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    // data is a FeatureCollection
    circuitMap = {};
    const features = data.features || data; // handle both FeatureCollection and array
    for (const f of (Array.isArray(features) ? features : [features])) {
      const id = f?.properties?.id;
      if (id) circuitMap[id] = f;
    }
    console.log("Loaded", Object.keys(circuitMap).length, "circuits");
    return circuitMap;
  } catch(e) {
    console.warn("Circuit fetch failed:", e);
    return null;
  }
}

function drawCircuitOnCanvas(canvas, feature, isDarkMode) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const geom = feature.geometry;
  if (!geom) return;

  // Collect coordinate array(s)
  let rings = [];
  if (geom.type === "LineString") rings = [geom.coordinates];
  else if (geom.type === "MultiLineString") rings = geom.coordinates;
  else return;

  const coords = rings.flat();
  if (!coords.length) return;

  // Bounding box
  let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
  for (const [lng, lat] of coords) {
    if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
    if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
  }

  const pad = 18;
  const dLng = maxLng - minLng || 0.001;
  const dLat = maxLat - minLat || 0.001;
  const scaleX = (W - pad * 2) / dLng;
  const scaleY = (H - pad * 2) / dLat;
  const scale  = Math.min(scaleX, scaleY);
  const offX = (W - dLng * scale) / 2;
  const offY = (H - dLat * scale) / 2;

  const toX = lng => offX + (lng - minLng) * scale;
  const toY = lat => H - (offY + (lat - minLat) * scale);

  // Glow pass
  ctx.save();
  ctx.strokeStyle = isDarkMode ? "rgba(232,0,29,0.35)" : "rgba(180,0,20,0.2)";
  ctx.lineWidth = 7;
  ctx.lineJoin = "round";
  ctx.lineCap  = "round";
  ctx.shadowColor = isDarkMode ? "rgba(232,0,29,0.6)" : "rgba(200,0,24,0.3)";
  ctx.shadowBlur  = 12;
  for (const ring of rings) {
    ctx.beginPath();
    ring.forEach(([lng, lat], i) => i === 0 ? ctx.moveTo(toX(lng), toY(lat)) : ctx.lineTo(toX(lng), toY(lat)));
    ctx.stroke();
  }
  ctx.restore();

  // Main line
  ctx.save();
  ctx.strokeStyle = isDarkMode ? "#e8001d" : "#cc0018";
  ctx.lineWidth   = 3;
  ctx.lineJoin    = "round";
  ctx.lineCap     = "round";
  for (const ring of rings) {
    ctx.beginPath();
    ring.forEach(([lng, lat], i) => i === 0 ? ctx.moveTo(toX(lng), toY(lat)) : ctx.lineTo(toX(lng), toY(lat)));
    ctx.stroke();
  }
  ctx.restore();

  // Start dot
  const [sLng, sLat] = coords[0];
  ctx.beginPath();
  ctx.arc(toX(sLng), toY(sLat), 4, 0, Math.PI * 2);
  ctx.fillStyle = isDarkMode ? "#ffffff" : "#111111";
  ctx.fill();
}

async function renderTrackCanvas(canvasId, raceId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dark = document.documentElement.getAttribute("data-theme") !== "light";
  const circuits = await loadAllCircuits();
  const cid = CIRCUIT_IDS[raceId];
  let feature = circuits && cid ? circuits[cid] : null;

  // If not found in combined file, try fetching the individual circuit file
  if (!feature && cid) {
    try {
      const url = `https://cdn.jsdelivr.net/gh/bacinger/f1-circuits@master/circuits/${cid}.geojson`;
      const res = await fetch(url);
      if (res.ok) feature = await res.json();
    } catch(e) { /* silent */ }
  }

  if (feature) {
    drawCircuitOnCanvas(canvas, feature, dark);
  } else {
    canvas.style.display = "none";
    const fallback = canvas.nextElementSibling;
    if (fallback) fallback.style.display = "block";
  }
}

//  RENDER RACE LIST
// ═══════════════════════════════════════════════════════════════════════════
function renderRaceList(filter='') {
  const list = document.getElementById('race-list');
  const filtered = RACES.filter(r =>
    r.name.toLowerCase().includes(filter.toLowerCase()) ||
    r.country.toLowerCase().includes(filter.toLowerCase()) ||
    r.city.toLowerCase().includes(filter.toLowerCase())
  );
  list.innerHTML = filtered.map(race => `
    <div class="race-item" onclick="selectRace(${race.id})" id="race-item-${race.id}">
      <span class="race-num">${race.id}</span>
      <span class="race-flag">${race.flag}</span>
      <div class="race-info">
        <div class="race-name">${race.name.replace(' Grand Prix', ' GP')}</div>
        <div class="race-meta">
          <span class="race-date-small">${race.date}</span>
          ${race.sprint ? '<span class="sprint-pill">SPRINT</span>' : ''}
        </div>
        <div class="race-winner-small" style="color:${TEAM_COLORS[race.winnerTeam]||'#888'}">${race.winner}</div>
      </div>
    </div>
  `).join('');
}

function filterRaces(v) { renderRaceList(v); }

//  SESSION BLOCK
// ═══════════════════════════════════════════════════════════════════════════
function tDot(team) { return `<span class="team-dot" style="background:${TEAM_COLORS[team]||'#888'}"></span>`; }

function wetBadge(session) {
  return session?.wet ? `<span class="wet-badge">🌧 WET</span>` : '';
}

function sessionBlock(label, data, isSprint=false) {
  if (!data) return `
    <div class="session-card">
      <div class="session-card-header"><span class="sname ${isSprint?'sprint-color':''}">${label}</span></div>
      <div class="no-data">— Not held —</div>
    </div>`;
  return `
    <div class="session-card">
      <div class="session-card-header">
        <span class="sname ${isSprint?'sprint-color':''}">${label}</span>
        ${wetBadge(data)}
      </div>
      <div class="podium-row">
        ${['p1','p2','p3'].map((p,i) => {
          const e = data[p];
          return `<div class="podium-entry ${p}">
            <div class="pos-num">${['P1','P2','P3'][i]}</div>
            <div class="driver-name">${e.driver}</div>
            <div class="driver-team">${tDot(e.team)}${e.team}</div>
            <div class="driver-time">${e.time}</div>
            ${e.gap ? `<div class="driver-gap">${e.gap}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER RACE
// ═══════════════════════════════════════════════════════════════════════════
function selectRace(id) {
  window._lastRaceId = id;
  document.querySelectorAll('.race-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`race-item-${id}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  if (typeof closeMobileSidebar === 'function') closeMobileSidebar();
  const race = RACES.find(r => r.id === id);
  if (!race) return;

  const isSprint = !!race.sprint;
  const hasFP = race.fp1 || race.fp2 || race.fp3;
  const trackFallbackSvg = TRACK_SVGS[id] || TRACK_SVGS[1];
  const canvasId = `track-canvas-${id}`;
  const tcol = TEAM_COLORS[race.winnerTeam] || '#888';

  // Build sessions HTML
  let ses = '';

  if (hasFP) {
    ses += `<div class="section-divider"><span class="sd-label">Practice</span></div>`;
    ses += `<div class="sessions-grid">`;
    if (race.fp1) ses += sessionBlock('Free Practice 1', race.fp1);
    if (race.fp2) ses += sessionBlock('Free Practice 2', race.fp2);
    if (race.fp3) ses += sessionBlock('Free Practice 3', race.fp3);
    ses += `</div>`;
  }

  if (isSprint && race.sq) {
    ses += `<div class="section-divider"><span class="sd-label" style="color:#ff6b00">Sprint Weekend</span></div>`;
    ses += `<div class="sessions-grid">`;
    ses += sessionBlock('Sprint Qualifying', race.sq, true);
    ses += sessionBlock('Sprint Race', race.sprintRace, true);
    ses += `</div>`;
  }

  ses += `<div class="section-divider"><span class="sd-label">Qualifying</span></div>`;
  ses += `<div class="sessions-grid">`;
  ses += sessionBlock('Q1', race.q1);
  ses += sessionBlock('Q2', race.q2);
  ses += `</div>`;
  ses += `<div style="margin-top:10px;">${sessionBlock('Q3 — Pole Position', race.q3)}</div>`;

  // Race podium
  const r = race.race;
  const racePodium = `
    <div class="section-divider"><span class="sd-label">Race Result</span></div>
    <div class="race-podium-special">
      <div class="race-podium-header">
        <span class="rph-title">🏁 Grand Prix Podium</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${r.wet ? `<span class="wet-badge">🌧 WET RACE</span>` : ''}
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">${race.laps} laps · ${race.distance}</span>
        </div>
      </div>
      <div class="race-winner-feature">
        <div class="rwf-pos">🏆</div>
        ${['p1','p2','p3'].map((p,i) => {
          const e = r[p], cls = ['p1-label','p2-label','p3-label'][i], pos = ['P1','P2','P3'][i];
          return `<div class="rwf-entry">
            <div class="rwf-pos-label ${cls}">${pos}</div>
            <div class="rwf-driver">${e.driver}</div>
            <div class="rwf-team">${tDot(e.team)}${e.team}</div>
            <div class="rwf-time">${e.time}</div>
            ${e.gap ? `<div class="driver-gap">${e.gap}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      ${r.sc && r.sc.length ? `
      <div class="sc-strip">
        <span class="sc-label">🚗 Safety Car</span>
        ${r.sc.map(s => `<span class="sc-entry"><span class="sc-laps">Laps ${s.laps}</span><span class="sc-reason">— ${s.reason}</span></span>`).join('')}
      </div>` : ''}
    </div>`;

  document.getElementById('main-content').innerHTML = `
    <div class="race-header">
      <div class="round-tag">
        ROUND ${race.id} · 2025 FIA FORMULA ONE WORLD CHAMPIONSHIP
        ${isSprint ? '<span class="sprint-tag">SPRINT WEEKEND</span>' : ''}
      </div>
      <h1 class="race-title">${race.name.replace(' Grand Prix', ' GP')}</h1>
      <div class="circuit-name">${race.circuit}</div>
    </div>

    <div class="facts-grid">
      <div class="fact-card">
        <div class="fact-label">📅 Race Date</div>
        <div class="fact-value">${race.date}</div>
      </div>
      <div class="fact-card">
        <div class="fact-label">📍 Location</div>
        <div class="fact-value">${race.city}, ${race.country}</div>
      </div>
      <div class="fact-card">
        <div class="fact-label">🌤 Weather</div>
        <div class="fact-value">${race.weather.icon} ${race.weather.desc} · ${race.weather.temp}</div>
      </div>
      <div class="fact-card">
        <div class="fact-label">🏁 Distance</div>
        <div class="fact-value mono">${race.laps} laps · ${race.distance}</div>
      </div>
      <div class="fact-card">
        <div class="fact-label">🏆 Winner</div>
        <div class="fact-value" style="color:${tcol}">${race.winner} <span style="font-size:11px;color:var(--muted);font-weight:400">${race.winnerTeam}</span></div>
      </div>
    </div>

    <div class="race-body">
      <div class="track-panel">
        <div class="panel-title">Circuit Layout</div>
        <div class="track-svg-wrap">
          <canvas id="${canvasId}" width="260" height="220" style="max-width:100%;max-height:220px;"></canvas>
          <div style="display:none">${trackFallbackSvg}</div>
        </div>
        <div class="track-stats">
          <div class="ts"><div class="k">Length</div><div class="v">${race.length}</div></div>
          <div class="ts"><div class="k">Distance</div><div class="v">${race.distance}</div></div>
          <div class="ts"><div class="k">Laps</div><div class="v">${race.laps}</div></div>
          <div class="ts"><div class="k">Format</div><div class="v">${isSprint ? 'Sprint' : 'Standard'}</div></div>
        </div>
        <div class="loc-box">
          <div class="panel-title">Location</div>
          <div class="loc-inner">
            <div class="loc-flag">${race.flag}</div>
            <div>
              <div class="loc-city">${race.city}, ${race.country}</div>
              <div class="loc-coords">${race.lat}°, ${race.lng}°</div>
            </div>
          </div>
        </div>

        ${(() => {
          const h = CIRCUIT_HISTORY[id];
          if (!h) return '';
          return `
          <div class="circuit-history">
            <div class="panel-title">Circuit History</div>
            <div class="history-grid">
              <div class="history-item">
                <div class="k">First Race</div>
                <div class="v accent">${h.firstRace}</div>
              </div>
              <div class="history-item">
                <div class="k">Most Wins</div>
                <div class="v">${h.mostWins.driver} <span style="color:var(--muted);font-size:11px">(${h.mostWins.wins})</span></div>
              </div>
              <div class="history-item full">
                <div class="k">Lap Record</div>
                <div class="v">${h.lapRecord.time} <span style="color:var(--muted);font-size:11px">— ${h.lapRecord.driver}, ${h.lapRecord.year}</span></div>
              </div>
              <div class="history-item full">
                <div class="k">Note</div>
                <div class="v" style="font-weight:400;font-size:12px;color:var(--muted)">${h.notes}</div>
              </div>
            </div>
          </div>`;
        })()}
      </div>

      <div class="sessions-panel">
        ${ses}
        ${racePodium}
      </div>
    </div>
  `;

  // Render the real track from GeoJSON onto canvas after DOM updates
  requestAnimationFrame(() => renderTrackCanvas(canvasId, id));
}

// Re-draw canvas on theme toggle
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
  const mnbIcon = document.getElementById('mnb-theme-icon');
  if (mnbIcon) mnbIcon.textContent = isDark ? '☀️' : '🌙';
  if (window._lastRaceId) {
    renderTrackCanvas(`track-canvas-${window._lastRaceId}`, window._lastRaceId);
  }
}

  document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));

  document.getElementById('view-2025').style.display    = season === '2025'    ? 'flex' : 'none';
  document.getElementById('view-2026').style.display    = season === '2026'    ? 'flex' : 'none';
  document.getElementById('view-compare').style.display = season === 'compare' ? 'flex' : 'none';

  const badge = document.getElementById('champion-badge');
  badge.style.display = season === '2025' ? '' : 'none';

  if (season === '2026')    init2026();
  if (season === 'compare') initCompare();

  // Mobile nav sync
  if (season === '2025')    setMobileNavActive('mnb-races');
  if (season === '2026')    setMobileNavActive('mnb-2026');
  if (season === 'compare') setMobileNavActive('mnb-compare');
  closeMobileSidebar();

// ─── Helpers ─────────────────────────────────────────────────────────────────
function cache2026Set(key, data) {
  try { sessionStorage.setItem('f1_2026_' + key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}

function cache2026Get(key) {
  try {
    const raw = sessionStorage.getItem('f1_2026_' + key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > CACHE_TTL_MS) return null;
    return obj.data;
  } catch(e) { return null; }
}

async function apiFetch(url, cacheKey) {
  if (cacheKey) {
    const cached = cache2026Get(cacheKey);
    if (cached) return cached;
  }
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (cacheKey) cache2026Set(cacheKey, data);
  return data;
}

function getRaceStatus(raceDate) {
  const now = new Date();
  const diff = raceDate - now;
  if (diff < -3600000 * 4) return 'done';     // finished >4h ago
  if (diff < 3600000 * 24 * 7) return 'next'; // within next 7 days
  return 'upcoming';
}

function formatCountdown(targetDate) {
  const diff = targetDate - new Date();
  if (diff <= 0) return null;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return { d, h, m, s };
}

// ─── Fetch race results from Ergast/Jolpi ────────────────────────────────────
async function fetch2026Results() {
  try {
    const data = await apiFetch(`${ERGAST_BASE}/results.json?limit=500`, 'results_all');
    const races = data?.MRData?.RaceTable?.Races || [];
    races.forEach(race => {
      const round = parseInt(race.round);
      const res = race.Results || [];
      if (res.length < 1) return;
      const top3 = res.slice(0, 3).map(r => ({
        driver: r.Driver.familyName,
        driverFull: `${r.Driver.givenName} ${r.Driver.familyName}`,
        team: normaliseTeam(r.Constructor.name),
        time: r.Time?.time || r.status || '—',
        gap: r.position > 1 ? (r.Time?.time ? '+' + r.Time.time : r.status) : '',
        position: r.position,
        laps: r.laps,
      }));
      races2026Results[round] = {
        winner: top3[0]?.driver,
        winnerTeam: top3[0]?.team,
        podium: top3,
        round, raceName: race.raceName,
        date: race.date,
        laps: top3[0]?.laps,
      };
    });
    return races;
  } catch(e) {
    console.warn('Ergast results fetch failed:', e);
    return [];
  }
}

// ─── Fetch standings ─────────────────────────────────────────────────────────
async function fetch2026Standings() {
  try {
    const [drv, con] = await Promise.all([
      apiFetch(`${ERGAST_BASE}/driverStandings.json`, 'driverStandings'),
      apiFetch(`${ERGAST_BASE}/constructorStandings.json`, 'constructorStandings'),
    ]);
    const driverList = drv?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings || [];
    const conList    = con?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings || [];
    return { driverList, conList };
  } catch(e) {
    console.warn('Standings fetch failed:', e);
    return { driverList: [], conList: [] };
  }
}

// ─── Fetch qualifying from Ergast ────────────────────────────────────────────
async function fetch2026Qualifying(round) {
  try {
    const data = await apiFetch(`${ERGAST_BASE}/${round}/qualifying.json`, `quali_${round}`);
    const results = data?.MRData?.RaceTable?.Races?.[0]?.QualifyingResults || [];
    if (!results.length) return null;
    const top3 = results.slice(0, 3).map(r => ({
      driver: r.Driver.familyName,
      team: normaliseTeam(r.Constructor.name),
      time: r.Q3 || r.Q2 || r.Q1 || '—',
      gap: '',
    }));
    // Compute gaps
    if (top3[0] && top3[1]) top3[1].gap = computeGap(top3[0].time, top3[1].time);
    if (top3[0] && top3[2]) top3[2].gap = computeGap(top3[0].time, top3[2].time);
    return {
      q1: buildQSplit(results, 'Q1'),
      q2: buildQSplit(results, 'Q2'),
      q3: buildQSplit(results, 'Q3'),
    };
  } catch(e) {
    console.warn(`Qualifying fetch failed round ${round}:`, e);
    return null;
  }
}

function buildQSplit(results, key) {
  const filtered = results.filter(r => r[key]).sort((a,b) => lapToMs(a[key]) - lapToMs(b[key]));
  if (filtered.length < 1) return null;
  const top3 = filtered.slice(0,3).map((r,i) => ({
    driver: r.Driver.familyName,
    team: normaliseTeam(r.Constructor.name),
    time: r[key],
    gap: i === 0 ? '' : computeGap(filtered[0][key], r[key]),
  }));
  return { p1: top3[0], p2: top3[1] || null, p3: top3[2] || null };
}

// ─── Fetch OpenF1 for most recent session ────────────────────────────────────
async function fetchOpenF1Latest() {
  try {
    const sessions = await apiFetch(`${OPENF1_BASE}/sessions?year=2026&session_type=Race`, 'of1_sessions');
    if (!sessions?.length) return null;
    // Sort by date descending, take most recent
    sessions.sort((a,b) => new Date(b.date_start) - new Date(a.date_start));
    return sessions[0];
  } catch(e) {
    console.warn('OpenF1 session fetch failed:', e);
    return null;
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function lapToMs(timeStr) {
  if (!timeStr || timeStr === '—') return Infinity;
  const parts = timeStr.split(':');
  if (parts.length === 2) return parseFloat(parts[0]) * 60000 + parseFloat(parts[1]) * 1000;
  return parseFloat(timeStr) * 1000;
}

function computeGap(base, other) {
  const diff = lapToMs(other) - lapToMs(base);
  if (!isFinite(diff) || diff <= 0) return '';
  return '+' + (diff / 1000).toFixed(3);
}

function normaliseTeam(name) {
  const map = {
    'McLaren': 'McLaren', 'Red Bull': 'Red Bull', 'Mercedes': 'Mercedes',
    'Ferrari': 'Ferrari', 'Williams': 'Williams', 'Alpine': 'Alpine',
    'Aston Martin': 'Aston Martin', 'Haas': 'Haas', 'Kick Sauber': 'Sauber',
    'Sauber': 'Sauber', 'RB': 'Racing Bulls', 'Racing Bulls': 'Racing Bulls',
    'Audi': 'Sauber', 'Cadillac': 'Cadillac',
  };
  for (const [k, v] of Object.entries(map)) {
    if (name.includes(k)) return v;
  }
  return name;
}

function renderNextRaceBanner() {
  const now = new Date();

  if (!next) return '';

  const cd = formatCountdown(next.raceDate);
  if (!cd) return '';

        <div class="cd-block"><div class="cd-num" id="cd-d">${cd.d}</div><div class="cd-unit">Days</div></div>

        <div class="cd-block"><div class="cd-num" id="cd-m">${String(cd.m).padStart(2,'0')}</div><div class="cd-unit">Min</div></div>

      </div>
    </div>`;
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  const now = new Date();
  const next = CALENDAR_2026.find(r => r.raceDate > now);
  if (!next) return;
  countdownInterval = setInterval(() => {
    const cd = formatCountdown(next.raceDate);
    if (!cd) { clearInterval(countdownInterval); return; }
    const d  = document.getElementById('cd-d');
    const h  = document.getElementById('cd-h');
    const m  = document.getElementById('cd-m');
    const s  = document.getElementById('cd-s');
    if (d) d.textContent = cd.d;
    if (h) h.textContent = String(cd.h).padStart(2,'0');
    if (m) m.textContent = String(cd.m).padStart(2,'0');
    if (s) s.textContent = String(cd.s).padStart(2,'0');
  }, 1000);
}

  render2026RaceList();
  await fetch2026Results();
  render2026RaceList(); // re-render with winners filled in
  await render2026Overview();

  // Auto-select next/most-recent race
  const now = new Date();
  const nextRace = CALENDAR_2026.find(r => r.raceDate > now);
  const lastDone = [...CALENDAR_2026].reverse().find(r => r.raceDate <= now);
  const autoSelect = lastDone || nextRace;
  if (autoSelect) select2026Race(autoSelect.id);
}

let compareInitDone = false;
let activeCompareRow = null;
let activeCmpTeam    = 'McLaren'; // default team for points chart

// ─── Build normalised comparison dataset ─────────────────────────────────────
// For each circuit raced in both seasons, extract pole time, driver, team, wet flag
function buildCompareData() {
  const rows = [];
  const now  = new Date();

  for (const race25 of RACES) {
    const cal26 = CALENDAR_2026.find(r => r.id === race25.id);
    if (!cal26) continue;

    // 2025 pole
    const q3_25 = race25.q3;
    const pole25 = q3_25?.p1 ? {
      time:   q3_25.p1.time,
      driver: q3_25.p1.driver,
      team:   q3_25.p1.team,
      wet:    !!q3_25.wet,
    } : null;

    // 2026 pole — from live API cache
    const result26 = races2026Results[cal26.round];
    const qualiKey = `f1_2026_quali_${cal26.round}`;
    let pole26 = null;

    // Try sessionStorage cache for qualifying
    try {
      const raw = sessionStorage.getItem('f1_2026_' + `quali_${cal26.round}`);
      if (raw) {
        const cached = JSON.parse(raw).data;
        if (cached?.q3?.p1) {
          pole26 = {
            time:   cached.q3.p1.time,
            driver: cached.q3.p1.driver,
            team:   cached.q3.p1.team,
            wet:    false,
          };
        }
      }
    } catch(e) {}

    // Compute delta (ms): negative = 2026 faster, positive = 2026 slower
    let deltaMs  = null;
    let deltaStr = null;
    let direction = null; // 'faster' | 'slower'

    if (pole25 && pole26) {
      const ms25 = lapToMs(pole25.time);
      const ms26 = lapToMs(pole26.time);
      if (isFinite(ms25) && isFinite(ms26)) {
        deltaMs   = ms26 - ms25;
        const abs = Math.abs(deltaMs / 1000);
        deltaStr  = (deltaMs < 0 ? '▼ ' : '▲ +') + abs.toFixed(3) + 's';
        direction = deltaMs < 0 ? 'faster' : 'slower';
      }
    }

    // Session-level deltas for mini bars
    const sessionDeltas = buildSessionDeltas(race25, cal26.round);

    // Condition mismatch warning
    const condMismatch = pole25?.wet !== pole26?.wet;

    rows.push({
      id: race25.id,
      name: race25.name.replace(' Grand Prix', ' GP'),
      flag: race25.flag,
      circuit: race25.circuit,
      pole25, pole26,
      deltaMs, deltaStr, direction,
      condMismatch,
      sessionDeltas,
      raced2026: cal26.raceDate <= now && !!pole26,
    });
  }
  return rows;
}

function buildSessionDeltas(race25, round26) {
  const sessions = [
    { key: 'q1', label: 'Q1' },
    { key: 'q2', label: 'Q2' },
    { key: 'q3', label: 'Q3' },
  ];

  return sessions.map(s => {
    const s25 = race25[s.key]?.p1;
    let s26   = null;

    try {
      const raw = sessionStorage.getItem(`f1_2026_quali_${round26}`);
      if (raw) {
        const cached = JSON.parse(raw).data;
        s26 = cached?.[s.key]?.p1;
      }
    } catch(e) {}

    if (!s25 || !s26) return { label: s.label, deltaMs: null, deltaStr: null, direction: null };

    const ms25 = lapToMs(s25.time);
    const ms26 = lapToMs(s26.time);
    if (!isFinite(ms25) || !isFinite(ms26)) return { label: s.label, deltaMs: null, deltaStr: null, direction: null };

    const dMs = ms26 - ms25;
    const abs = Math.abs(dMs / 1000);
    return {
      label:     s.label,
      deltaMs:   dMs,
      deltaStr:  (dMs < 0 ? '▼ ' : '▲ +') + abs.toFixed(3) + 's',
      direction: dMs < 0 ? 'faster' : 'slower',
      time25:    s25.time,
      time26:    s26.time,
    };
  });
}

// ─── Render headline + tug-of-war ─────────────────────────────────────────────
function renderCompareHeadline(rows) {
  const withData   = rows.filter(r => r.deltaMs !== null);
  const fasterRows = withData.filter(r => r.direction === 'faster');
  const slowerRows = withData.filter(r => r.direction === 'slower');

  if (!withData.length) {
    return `<div class="cmp-headline"><div><div class="cmp-hl-label">2025 vs 2026 — Pole Time Delta</div><div class="cmp-hl-sub">No comparable races yet. Check back once 2026 qualifying data is available.</div></div></div>`;
  }

  const avgDelta = withData.reduce((s, r) => s + r.deltaMs, 0) / withData.length;
  const absSec   = Math.abs(avgDelta / 1000).toFixed(3);
  const dir      = avgDelta < 0 ? 'faster' : 'slower';
  const col      = dir === 'faster' ? 'faster' : 'slower';
  const arrow    = dir === 'faster' ? '▼' : '▲';

  // Tug bar widths (max 45% each side)
  const total     = fasterRows.length + slowerRows.length;
  const fasterPct = Math.round((fasterRows.length / total) * 45);
  const slowerPct = Math.round((slowerRows.length / total) * 45);

  return `
    <div class="cmp-headline">
      <div>
        <div class="cmp-hl-label">Average Pole Time Delta · ${withData.length} circuits</div>
        <div class="cmp-hl-delta delta-${col}">${arrow} ${absSec}s</div>
        <div class="cmp-hl-sub">2026 cars are on average <strong>${absSec}s ${dir}</strong> than 2025</div>
      </div>
      <div class="tug-wrap">
        <div class="tug-labels"><span>◀ 2026 Faster</span><span>2026 Slower ▶</span></div>
        <div class="tug-bar">
          <div class="tug-fill-faster" style="width:${fasterPct}%"></div>
          <div class="tug-fill-slower" style="width:${slowerPct}%"></div>
          <div class="tug-centre"></div>
        </div>
        <div class="tug-counts">
          <span class="tug-faster-count">● ${fasterRows.length} circuits faster</span>
          <span class="tug-slower-count">${slowerRows.length} circuits slower ●</span>
        </div>
      </div>
    </div>`;
}

// ─── Render circuit dot row ───────────────────────────────────────────────────
function renderDotRow(rows) {

// ─── Render delta bar list ────────────────────────────────────────────────────
function renderDeltaBars(rows) {
  // Max delta for bar scaling
  const withData = rows.filter(r => r.deltaMs !== null);
  const maxAbs   = withData.length ? Math.max(...withData.map(r => Math.abs(r.deltaMs))) : 1000;

  const barPct = (ms) => Math.min(45, Math.round((Math.abs(ms) / maxAbs) * 45));

  let html = `
    <div class="cmp-bars-header">
      <div>Circuit</div>
      <div style="text-align:center">Pole Time Delta (2026 vs 2025)</div>
      <div style="text-align:right">Delta</div>
    </div>`;

  for (const row of rows) {
    const hasData = row.deltaMs !== null;
    const pct     = hasData ? barPct(row.deltaMs) : 0;
    const dir     = row.direction || 'nodata';

    html += `
      <div class="cmp-bar-row" id="cmprow-${row.id}" onclick="toggleCompareRow(${row.id})">
        <div class="cmp-bar-main">
          <div class="cmp-circuit-name">${row.flag} ${row.name.replace(' GP', '')}</div>
          <div class="cmp-bar-track">
            <div class="cmp-zero-line"></div>
            ${hasData ? `<div class="cmp-delta-bar ${dir}" style="width:${pct}%"></div>` : ''}
          </div>
          <div class="cmp-delta-val ${dir}">${hasData ? row.deltaStr : '— TBD'}</div>
        </div>
        <div class="cmp-detail" id="cmpdetail-${row.id}">
          ${renderCompareDetail(row)}
        </div>
      </div>`;
  }
  return html;
}

// ─── Points trajectory chart (SVG sparklines) ────────────────────────────────
function renderPointsChart() {
  const teams = Object.keys(TEAM_COLORS).slice(0, 6);

  // Build 2025 cumulative points per team per round from RACES
  const pts2025 = buildCumulativePoints2025();
  // 2026 from live results
  const pts2026 = buildCumulativePoints2026();

  const hasAny2026 = Object.values(pts2026).some(arr => arr.some(v => v > 0));

  const pillsHTML = teams.map(t => `
    <button class="cmp-team-pill ${t === activeCmpTeam ? 'active' : ''}"

      onclick="setCmpTeam('${t}')">${t}</button>
  `).join('');

  return `
    <div class="cmp-points-panel">
      <div class="cmp-points-header">

          <div class="cmp-legend-item"><div class="cmp-legend-line" style="background:#00c8ff;opacity:0.9;border-top:2px dashed #00c8ff;height:0"></div>2026</div>
        </div>

      ${hasAny2026 ? chartHTML : `<div class="cmp-no-data">2026 race results not yet available — check back after the first race.</div>`}
    </div>`;
}

function buildCumulativePoints2025() {
  const totals = {};
  const rounds = RACES.length;
  // Points for P1–P10: 25,18,15,12,10,8,6,4,2,1
  const PTS = [25,18,15,12,10,8,6,4,2,1];

  for (const team of Object.keys(TEAM_COLORS)) totals[team] = new Array(rounds).fill(0);

  RACES.forEach((race, idx) => {
    const r = race.race;
    [r.p1, r.p2, r.p3].forEach((entry, i) => {
      if (!entry || !totals[entry.team]) return;
      totals[entry.team][idx] += PTS[i];
    });
  });

  // Cumulate
  for (const team of Object.keys(totals)) {
    for (let i = 1; i < rounds; i++) totals[team][i] += totals[team][i-1];
  }
  return totals;
}

function buildCumulativePoints2026() {
  const totals = {};
  const PTS    = [25,18,15,12,10,8,6,4,2,1];

  for (const team of Object.keys(TEAM_COLORS)) totals[team] = new Array(CALENDAR_2026.length).fill(0);

  Object.values(races2026Results).forEach(result => {
    const round = result.round - 1; // 0-indexed
    if (round < 0) return;
    (result.podium || []).forEach((entry, i) => {
      if (!totals[entry.team]) return;
      totals[entry.team][round] += PTS[i];
    });
  });

  for (const team of Object.keys(totals)) {
    for (let i = 1; i < CALENDAR_2026.length; i++) totals[team][i] += totals[team][i-1];
  }
  return totals;
}

function renderSparklines(pts2025, pts2026, team) {
  const W = 600, H = 140, padL = 30, padR = 10, padT = 10, padB = 24;
  const n25 = RACES.length;
  const n26 = CALENDAR_2026.length;
  const n   = Math.max(n25, n26);

  const all25 = Object.values(pts2025).flat();
  const all26 = Object.values(pts2026).flat();
  const maxPts = Math.max(...all25, ...all26, 1);

  const xScale = (W - padL - padR) / (n - 1);
  const yScale = (H - padT - padB) / maxPts;

  const toX = i => padL + i * xScale;
  const toY = v => H - padB - v * yScale;

  // Y-axis grid lines
  const yTicks = [0, Math.round(maxPts * 0.25), Math.round(maxPts * 0.5), Math.round(maxPts * 0.75), maxPts];
  const gridLines = yTicks.map(v => `
    <line x1="${padL}" y1="${toY(v)}" x2="${W - padR}" y2="${toY(v)}" stroke="var(--border)" stroke-width="1"/>
    <text x="${padL - 4}" y="${toY(v) + 4}" fill="var(--muted)" font-size="8" text-anchor="end" font-family="monospace">${v}</text>
  `).join('');

  // X-axis labels (every 4 rounds)
  const xLabels = RACES.filter((_, i) => i % 4 === 0).map(r => {
    const i = r.id - 1;
    return `<text x="${toX(i)}" y="${H - 4}" fill="var(--muted)" font-size="8" text-anchor="middle" font-family="monospace">${r.id}</text>`;
  }).join('');

  function polyline(data, n, dash = '') {
    const pts = data.slice(0, n).map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    return pts;
  }

  // All teams as faded lines, selected team highlighted
  let allLines = '';
  for (const [t, col] of Object.entries(TEAM_COLORS)) {
    if (t === team) continue;
    const p25 = pts2025[t];
    if (p25) allLines += `<polyline points="${polyline(p25, n25)}" fill="none" stroke="${col}" stroke-width="1" opacity="0.12"/>`;
  }

  const selCol = TEAM_COLORS[team] || '#e8001d';
  const p25  = pts2025[team] || [];
  const p26  = pts2026[team] || [];

  const line25 = p25.length ? `<polyline points="${polyline(p25, n25)}" fill="none" stroke="${selCol}" stroke-width="2.5" opacity="0.9"/>` : '';
  const line26 = p26.some(v => v > 0)
    ? `<polyline points="${polyline(p26.filter((_,i) => i < Object.keys(races2026Results).length + 1), Object.keys(races2026Results).length + 1)}" fill="none" stroke="#00c8ff" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.9"/>`
    : '';

  // End-point labels
  const endLabel25 = p25.length ? `<text x="${toX(n25-1)+4}" y="${toY(p25[n25-1])+4}" fill="${selCol}" font-size="9" font-family="monospace" font-weight="bold">${p25[n25-1]}</text>` : '';
  const lastRound26 = Object.keys(races2026Results).length;
  const endLabel26 = lastRound26 > 0 && p26[lastRound26-1] > 0
    ? `<text x="${toX(lastRound26-1)+4}" y="${toY(p26[lastRound26-1])+4}" fill="#00c8ff" font-size="9" font-family="monospace" font-weight="bold">${p26[lastRound26-1]}</text>`
    : '';

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">
      ${gridLines}
      ${xLabels}
      ${allLines}
      ${line25}
      ${line26}
      ${endLabel25}
      ${endLabel26}
    </svg>`;
}

function setCmpTeam(team) {
  activeCmpTeam = team;
  const chartSlot = document.getElementById('cmp-chart-slot');
  if (chartSlot) chartSlot.innerHTML = renderPointsChart();
}

// ─── Toggle row expand ────────────────────────────────────────────────────────
function toggleCompareRow(id) {
  const detail = document.getElementById(`cmpdetail-${id}`);
  const row    = document.getElementById(`cmprow-${id}`);
  const dot    = document.getElementById(`dot-${id}`);
  if (!detail) return;

  const isOpen = detail.classList.contains('open');

  // Close all others
  document.querySelectorAll('.cmp-detail.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.cmp-bar-row.cmp-row-active').forEach(el => el.classList.remove('cmp-row-active'));
  document.querySelectorAll('.cmp-dot.cmp-active').forEach(el => el.classList.remove('cmp-active'));

  if (!isOpen) {
    detail.classList.add('open');
    row.classList.add('cmp-row-active');
    if (dot) dot.classList.add('cmp-active');
    activeCompareRow = id;
  } else {
    activeCompareRow = null;
  }
}

function scrollToRow(id) {
  const el = document.getElementById(`cmprow-${id}`);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); toggleCompareRow(id); }
}

// ─── Init Compare ─────────────────────────────────────────────────────────────
async function initCompare(force = false) {
  if (compareInitDone && !force) return;
  compareInitDone = true;

  const mc = document.getElementById('main-content-compare');
  mc.innerHTML = `<div class="api-loading"><div class="spinner"></div>Building comparison…</div>`;

  // Make sure 2026 data is loaded first
  if (!init2026Done) {
    await fetch2026Results();
    // Also try to pre-fetch qualifying for any completed 2026 rounds
    const now = new Date();
    for (const cal of CALENDAR_2026) {
      if (cal.raceDate < now) await fetch2026Qualifying(cal.round).catch(() => {});
    }
  }

  const rows = buildCompareData();

  mc.innerHTML = `
    ${renderCompareHeadline(rows)}
    ${renderDotRow(rows)}
    <div>
      ${renderDeltaBars(rows)}
    </div>
    <div id="cmp-chart-slot">
      ${renderPointsChart()}
    </div>`;
}
