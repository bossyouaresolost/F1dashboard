// ─── Derive pole data from 2025 RACES ─────────────────────────────────────
function get2025PoleData(raceId) {
  const race = RACES.find(r => r.id === raceId);
  if (!race) return null;
  const q3 = race.q3;
  if (!q3?.p1) return null;
  const isWet = !!(q3.wet);
  return {
    driver:  q3.p1.driver,
    team:    q3.p1.team,
    time:    q3.p1.time,
    wet:     isWet,
    weather: race.weather,
  };
}

// ─── Derive 2026 pole data from fetched qualifying ─────────────────────────
// Stored in compare2026Quali keyed by round
const compare2026Quali = {};

async function ensure2026Quali(round) {
  if (compare2026Quali[round] !== undefined) return compare2026Quali[round];
  const data = await fetch2026Qualifying(round);
  compare2026Quali[round] = data;
  return data;
}

function get2026PoleData(round, qualiData) {
  if (!qualiData?.q3?.p1) return null;
  const p = qualiData.q3.p1;
  return {
    driver: p.driver,
    team:   p.team,
    time:   p.time,
    wet:    false, // OpenF1 weather could augment this; default dry for now
    weather: { icon: '—', desc: '—' },
  };
}

// ─── Time string → milliseconds ───────────────────────────────────────────
function timeToMs(str) {
  if (!str || str === '—') return null;
  // Formats: "1:14.156" or "74.156"
  const parts = str.split(':');
  if (parts.length === 2) {
    return parseFloat(parts[0]) * 60000 + parseFloat(parts[1]) * 1000;
  }
  return parseFloat(str) * 1000;
}

// ─── Conditions validity check ────────────────────────────────────────────
function conditionsValidity(pole25, pole26) {
  if (!pole25 || !pole26) return 'pending';
  const wet25 = pole25.wet;
  const wet26 = pole26.wet;
  if (!wet25 && !wet26) return 'valid';       // both dry — ideal
  if (wet25 && wet26)   return 'both-wet';    // both wet — comparable but slower
  return 'invalid';                            // mixed — not meaningful
}

function conditionsBadge(validity, wet25, wet26) {
  const icons = {
    'valid':    { cls: 'cond-valid',    icon: '✓', text: 'Both dry — valid comparison' },
    'both-wet': { cls: 'cond-both-wet', icon: '⚠', text: 'Both wet — comparable but slower baseline' },
    'invalid':  { cls: 'cond-invalid',  icon: '⚠', text: `Conditions differ — ${wet25?'2025 wet':'2025 dry'} vs ${wet26?'2026 wet':'2026 dry'}` },
    'pending':  { cls: 'cond-invalid',  icon: '—', text: '2026 data not yet available' },
  };
  const b = icons[validity] || icons['pending'];
  return `<span class="conditions-badge ${b.cls}">${b.icon} ${b.text}</span>`;
}

// ─── Delta display helpers ─────────────────────────────────────────────────
function deltaClass(deltaMs, validity) {
  if (validity === 'pending') return 'pending';
  if (validity === 'invalid') return 'invalid';
  return deltaMs < 0 ? 'faster' : 'slower';
}

function deltaLabel(deltaMs, validity) {
  if (validity === 'pending') return '—';
  const sign  = deltaMs < 0 ? '▼ ' : '▲ ';
  const word  = deltaMs < 0 ? 'faster' : 'slower';
  const abs   = Math.abs(deltaMs / 1000).toFixed(3);
  return `${sign}${abs}s`;
}

// Bar width as % of half-track (max spread = 3s = 100%)
const MAX_DELTA_MS = 3000;
function deltaBarPct(deltaMs) {
  return Math.min(100, Math.abs(deltaMs) / MAX_DELTA_MS * 100);
}

// ─── Session mini-bars helper ─────────────────────────────────────────────
function buildMiniBar(label, time25, time26, validity) {
  if (!time25 || !time26) {
    return `<div class="smb-row">
      <span class="smb-label">${label}</span>
      <div class="smb-bar-track"><div class="smb-centre"></div></div>
      <span class="smb-val na">—</span>
    </div>`;
  }
  const d    = timeToMs(time26) - timeToMs(time25);
  const cls  = validity === 'invalid' ? 'invalid' : d < 0 ? 'faster' : 'slower';
  const pct  = deltaBarPct(d);
  const val  = (d < 0 ? '▼ ' : '▲ ') + Math.abs(d/1000).toFixed(3) + 's';
  const side = d < 0 ? 'faster' : 'slower';
  return `<div class="smb-row">
    <span class="smb-label">${label}</span>
    <div class="smb-bar-track">
      <div class="smb-fill ${validity==='invalid'?'invalid':side}" style="width:${pct}%"></div>
      <div class="smb-centre"></div>
    </div>
    <span class="smb-val ${cls}">${val}</span>
  </div>`;
}

// ─── Render one delta row ──────────────────────────────────────────────────
function renderDeltaRow(calRace, pole25, pole26, qualiData) {
  const validity = conditionsValidity(pole25, pole26);
  const deltaMs  = (pole25 && pole26)
    ? timeToMs(pole26.time) - timeToMs(pole25.time)
    : null;
  const cls      = deltaClass(deltaMs, validity);
  const barPct   = deltaMs !== null ? deltaBarPct(deltaMs) : 0;
  const side     = deltaMs !== null ? (deltaMs < 0 ? 'faster' : 'slower') : 'invalid';
  const valLabel = deltaMs !== null ? deltaLabel(deltaMs, validity) : '—';

  // Session mini-bars data
  const q1_25  = RACES.find(r=>r.id===calRace.id)?.q1?.p1?.time;
  const q2_25  = RACES.find(r=>r.id===calRace.id)?.q2?.p1?.time;
  const q3_25  = pole25?.time;
  const race25 = RACES.find(r=>r.id===calRace.id)?.race?.p1?.time;

  const q1_26  = qualiData?.q1?.p1?.time;
  const q2_26  = qualiData?.q2?.p1?.time;
  const q3_26  = pole26?.time;
  // 2026 race winner time
  const raceResult26 = races2026Results[calRace.round];
  const race26 = raceResult26?.podium?.[0]?.time;

  return `
  <div class="delta-row" id="drow-${calRace.id}" onclick="toggleDeltaRow(${calRace.id})">
    <div class="delta-row-main">
      <span class="dr-round">${calRace.round}</span>
      <span class="dr-flag">${calRace.flag}</span>
      <span class="dr-name">${calRace.name}</span>
      <div class="delta-bar-wrap">
        <div class="delta-bar-track">
          <div class="delta-bar-fill ${validity==='invalid'?'invalid dashed':side}"
               style="width:${barPct}%"></div>
          <div class="delta-bar-centre"></div>
        </div>
      </div>
      <span class="dr-delta-val ${cls}">${valLabel}</span>
    </div>
    <div class="delta-row-detail">
      <div class="pole-compare-grid">
        <div class="pole-card y2025">
          <div class="pc-year y2025">2025</div>
          ${pole25 ? `
          <div class="pc-driver">${pole25.driver}</div>
          <div class="pc-team">${tDot(pole25.team)}${pole25.team}</div>
          <div class="pc-time">${pole25.time}</div>
          <div class="pc-conditions">${pole25.weather?.icon || ''} ${pole25.wet ? 'Wet' : 'Dry'}</div>
          ` : `<div style="color:var(--muted);font-size:12px;margin-top:8px">No data</div>`}
        </div>
        <div class="pole-vs-col">
          <span class="vs-label">VS</span>
          <span class="vs-delta-big ${cls}">${deltaMs !== null ? (Math.abs(deltaMs/1000).toFixed(3)+'s') : '—'}</span>
          <span style="font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace">${deltaMs!==null?(deltaMs<0?'2026 FASTER':'2026 SLOWER'):''}</span>
          ${conditionsBadge(validity, pole25?.wet, pole26?.wet)}
        </div>
        <div class="pole-card y2026">
          <div class="pc-year y2026">2026</div>
          ${pole26 ? `
          <div class="pc-driver">${pole26.driver}</div>
          <div class="pc-team">${tDot(pole26.team)}${pole26.team}</div>
          <div class="pc-time">${pole26.time}</div>
          <div class="pc-conditions">${pole26.weather?.icon || ''} ${pole26.wet ? 'Wet' : 'Dry'}</div>
          ` : `<div style="color:var(--muted);font-size:12px;margin-top:8px">Not yet available</div>`}
        </div>
      </div>
      <div class="session-mini-bars">
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Session Deltas (2026 − 2025)</div>
        ${buildMiniBar('Q1', q1_25, q1_26, validity)}
        ${buildMiniBar('Q2', q2_25, q2_26, validity)}
        ${buildMiniBar('Q3 Pole', q3_25, q3_26, validity)}
        ${buildMiniBar('Race P1', race25, race26, 'valid')}
      </div>
    </div>
  </div>`;
}

function toggleDeltaRow(id) {
  const row = document.getElementById(`drow-${id}`);
  if (row) row.classList.toggle('expanded');
}

// ─── Points sparkline SVG ─────────────────────────────────────────────────
function buildSparklineSVG(teams) {
  // Accumulate 2025 points per round per team
  const rounds = 24;
  const W = 700, H = 200, padL = 40, padR = 20, padT = 20, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  // Build cumulative points from RACES data
  const pts2025 = {}; // team → [cumPts after each round]
  teams.forEach(t => { pts2025[t] = []; });

  let runningTotals25 = {};
  teams.forEach(t => runningTotals25[t] = 0);

  for (let i = 1; i <= 24; i++) {
    const race = RACES.find(r => r.id === i);
    if (race) {
      // Award points to winner's team (simplified: P1=25, P2=18, P3=15)
      const pts = [25, 18, 15];
      ['p1','p2','p3'].forEach((p, idx) => {
        const team = race.race?.[p]?.team;
        if (team && runningTotals25[team] !== undefined) {
          runningTotals25[team] += pts[idx];
        }
      });
    }
    teams.forEach(t => pts2025[t].push(runningTotals25[t]));
  }

  // Build cumulative 2026 points from races2026Results
  const pts2026 = {};
  teams.forEach(t => { pts2026[t] = []; });
  let runningTotals26 = {};
  teams.forEach(t => runningTotals26[t] = 0);

  for (let i = 1; i <= 24; i++) {
    const result = Object.values(races2026Results).find(r => r.round === i);
    if (result?.podium) {
      const pts = [25, 18, 15];
      result.podium.forEach((e, idx) => {
        if (teams.includes(e.team)) runningTotals26[e.team] += pts[idx];
      });
    }
    teams.forEach(t => pts2026[t].push(runningTotals26[t]));
  }

  // Max points for scale
  const allPts = [...Object.values(pts2025).flat(), ...Object.values(pts2026).flat()];
  const maxPts = Math.max(...allPts, 100);

  const xScale = i => padL + (i / (rounds - 1)) * chartW;
  const yScale = v => padT + chartH - (v / maxPts) * chartH;

  const teamColors2025 = { McLaren:'#ff8000', 'Red Bull':'#3671c6', Mercedes:'#27f4d2', Ferrari:'#e8001d' };
  const teamColors2026 = { McLaren:'#ffb347', 'Red Bull':'#6fa0ff', Mercedes:'#80ffe0', Ferrari:'#ff6060' };

  let svgLines = '';

  teams.forEach(team => {
    // 2025 line — solid
    const pts25 = pts2025[team];
    const path25 = pts25.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join(' ');
    svgLines += `<path d="${path25}" stroke="${teamColors2025[team]||'#888'}" stroke-width="2" fill="none" opacity="0.9"/>`;

    // 2026 line — dashed
    const pts26 = pts2026[team];
    const path26 = pts26.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join(' ');
    svgLines += `<path d="${path26}" stroke="${teamColors2026[team]||'#aaa'}" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.85"/>`;
  });

  // Grid lines
  let gridLines = '';
  [0, 0.25, 0.5, 0.75, 1].forEach(frac => {
    const y = padT + chartH * (1 - frac);
    const val = Math.round(frac * maxPts);
    gridLines += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    gridLines += `<text x="${padL - 4}" y="${(y+4).toFixed(1)}" fill="rgba(128,128,160,0.8)" font-size="9" text-anchor="end" font-family="monospace">${val}</text>`;
  });

  // Round markers
  let roundMarkers = '';
  [1, 6, 12, 18, 24].forEach(r => {
    const x = xScale(r-1);
    roundMarkers += `<text x="${x.toFixed(1)}" y="${H-4}" fill="rgba(128,128,160,0.6)" font-size="8" text-anchor="middle" font-family="monospace">${r}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:220px">
    ${gridLines}
    ${svgLines}
    ${roundMarkers}
    <text x="${W/2}" y="${H-2}" fill="rgba(128,128,160,0.5)" font-size="8" text-anchor="middle" font-family="monospace">ROUND</text>
  </svg>`;
}

// ─── Build team filter buttons ────────────────────────────────────────────
const COMPARE_TEAMS = ['McLaren', 'Red Bull', 'Mercedes', 'Ferrari'];
let activeSparklineTeams = new Set(COMPARE_TEAMS);

function renderSparklinePanel() {
  const teamColors = { McLaren:'#ff8000', 'Red Bull':'#3671c6', Mercedes:'#27f4d2', Ferrari:'#e8001d' };

  const filterBtns = COMPARE_TEAMS.map(t => {
    const active = activeSparklineTeams.has(t);
    return `<button class="stf-btn ${active?'active':''}"
      style="${active?`background:${teamColors[t]}20;border-color:${teamColors[t]};color:${teamColors[t]}`:''}"
      onclick="toggleSparklineTeam('${t}')">${t}</button>`;
  }).join('');

  const legendItems = COMPARE_TEAMS.filter(t => activeSparklineTeams.has(t)).map(t => `
    <div class="sl-item">
      <div class="sl-line" style="background:${teamColors[t]}"></div>
      <span>${t} 2025</span>
    </div>
    <div class="sl-item">
      <div class="sl-line" style="background:${teamColors[t]};opacity:0.6" class="dashed"></div>
      <span>${t} 2026</span>
    </div>`).join('');

  const teams = COMPARE_TEAMS.filter(t => activeSparklineTeams.has(t));
  const svg   = teams.length ? buildSparklineSVG(teams) : '<div style="color:var(--muted);font-size:12px;padding:20px">Select at least one team</div>';

  return `
    <div class="sparkline-panel">
      <div class="sparkline-header">
        <span class="sparkline-title">Constructor Points Trajectory — 2025 vs 2026</span>
        <div class="sparkline-legend">${legendItems}</div>
      </div>
      <div class="sparkline-team-filter">${filterBtns}</div>
      <div class="sparkline-scroll" id="sparkline-svg-wrap">${svg}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);margin-top:8px">
        Solid line = 2025 · Dashed line = 2026 · Points simplified (P1=25, P2=18, P3=15 per race)
      </div>
    </div>`;
}

function toggleSparklineTeam(team) {
  if (activeSparklineTeams.has(team)) {
    if (activeSparklineTeams.size > 1) activeSparklineTeams.delete(team);
  } else {
    activeSparklineTeams.add(team);
  }
  // Re-render just the sparkline panel
  const slot = document.getElementById('sparkline-slot');
  if (slot) slot.innerHTML = renderSparklinePanel();
}

// ─── Headline stats ────────────────────────────────────────────────────────
function buildHeadlineStats(deltaRows) {
  // Only valid/both-wet comparisons
  const valid = deltaRows.filter(d => d.validity !== 'pending' && d.validity !== 'invalid' && d.deltaMs !== null);
  const faster = valid.filter(d => d.deltaMs < 0);
  const slower = valid.filter(d => d.deltaMs >= 0);
  const avgDelta = valid.length ? valid.reduce((s,d) => s + d.deltaMs, 0) / valid.length : null;

  const tugFaster = valid.length ? (faster.length / valid.length * 100) : 50;
  const tugSlower = 100 - tugFaster;

  const avgLabel = avgDelta !== null
    ? `${Math.abs(avgDelta/1000).toFixed(3)}s ${avgDelta < 0 ? 'faster' : 'slower'}`
    : '—';
  const avgClass = avgDelta !== null ? (avgDelta < 0 ? 'faster' : 'slower') : '';

  return { avgLabel, avgClass, avgDelta, tugFaster, tugSlower, faster: faster.length, slower: slower.length, total: valid.length };
}

// ─── Main Compare render ───────────────────────────────────────────────────
async function renderCompareView() {
  const mc = document.getElementById('main-content-compare');
  mc.innerHTML = `<div class="api-loading" style="padding:40px"><div class="spinner"></div>Building comparison…</div>`;

  // Ensure 2026 data is loaded
  await fetch2026Results();

  // Build delta data for all 24 circuits
  const deltaRows = [];
  const completedRounds = Object.keys(races2026Results).map(Number);

  for (const calRace of CALENDAR_2026) {
    const pole25 = get2025PoleData(calRace.id);
    let pole26 = null;
    let qualiData = null;

    if (completedRounds.includes(calRace.round)) {
      qualiData = await ensure2026Quali(calRace.round);
      pole26 = get2026PoleData(calRace.round, qualiData);
    }

    const validity = conditionsValidity(pole25, pole26);
    const deltaMs  = (pole25 && pole26) ? timeToMs(pole26.time) - timeToMs(pole25.time) : null;
    deltaRows.push({ calRace, pole25, pole26, qualiData, validity, deltaMs });
  }

  const stats = buildHeadlineStats(deltaRows);

  // Build circuit dots
  const dots = deltaRows.map(d => {
    const cls = d.validity === 'pending' ? 'dot-pending'
              : d.validity === 'invalid' ? 'dot-invalid'
              : d.deltaMs < 0            ? 'dot-faster'
              : 'dot-slower';
    return `<div class="circuit-dot-wrap" onclick="switchCompareSubtab('poles');document.getElementById('drow-${d.calRace.id}')?.scrollIntoView({behavior:'smooth',block:'center'});toggleDeltaRow(${d.calRace.id})" title="${d.calRace.name}">
      <div class="circuit-dot ${cls}"></div>
      <span class="circuit-dot-num">${d.calRace.round}</span>
    </div>`;
  }).join('');

  mc.innerHTML = `
    <!-- HEADLINE -->
    <div class="compare-headline">
      <div class="ch-main">
        <div class="ch-label">Average Pole Time Delta · ${stats.total} circuits compared</div>
        <div class="ch-delta">
          <span class="${stats.avgClass}">${stats.avgLabel}</span>
          <span class="unit">${stats.avgClass === 'faster' ? '▼ 2026 faster' : stats.avgClass === 'slower' ? '▲ 2026 slower' : ''}</span>
        </div>
        <div class="ch-sub">
          Based on ${stats.total} valid like-for-like comparisons of qualifying pole times
        </div>
      </div>
      <div class="tug-bar-wrap">
        <div class="tug-label-row">
          <span>🟢 2026 Faster</span>
          <span>2026 Slower 🔴</span>
        </div>
        <div class="tug-bar">
          <div class="tug-left"  style="width:${stats.tugFaster/2}%"></div>
          <div style="flex:1"></div>
          <div class="tug-right" style="width:${stats.tugSlower/2}%"></div>
          <div class="tug-centre"></div>
        </div>
        <div class="tug-counts">
          <span class="faster-count">▼ Faster: ${stats.faster}</span>
          <span style="color:var(--muted)">${stats.total} races</span>
          <span class="slower-count">Slower: ${stats.slower} ▲</span>
        </div>
      </div>
    </div>

    <!-- CIRCUIT DOTS -->
    <div class="circuit-dots-row">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;width:100%;margin-bottom:6px">
        🟢 2026 Faster &nbsp;🔴 2026 Slower &nbsp;🟡 Conditions differ &nbsp;⚫ Pending
      </div>
      ${dots}
    </div>

    <!-- SUB-TABS -->
    <div class="compare-subtabs">
      <button class="compare-subtab active" id="cst-poles"   onclick="switchCompareSubtab('poles')">Pole Time Deltas</button>
      <button class="compare-subtab"        id="cst-points"  onclick="switchCompareSubtab('points')">Points Trajectory</button>
    </div>

    <!-- POLES PANEL -->
    <div class="compare-panel active" id="cpanel-poles">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:10px">
        CLICK ANY ROW TO EXPAND · Bar width = delta magnitude (max scale 3s)
      </div>
      <div class="delta-list">
        ${deltaRows.map(d => renderDeltaRow(d.calRace, d.pole25, d.pole26, d.qualiData)).join('')}
      </div>
    </div>

    <!-- POINTS PANEL -->
    <div class="compare-panel" id="cpanel-points">
      <div id="sparkline-slot">${renderSparklinePanel()}</div>
    </div>
  `;
}

function switchCompareSubtab(tab) {
  document.querySelectorAll('.compare-subtab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.compare-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`cst-${tab}`).classList.add('active');
  document.getElementById(`cpanel-${tab}`).classList.add('active');
}

// ─── Init Compare ─────────────────────────────────────────────────────────
let initCompareDone = false;

async function initCompare(force = false) {
  if (initCompareDone && !force) return;
  initCompareDone = true;
  await renderCompareView();
}

function isMobile() { return window.innerWidth < 768; }

// Show/hide sidebar toggle button and mobile nav based on screen size
function updateMobileUI() {
  const mobile = isMobile();
  const toggleBtn = document.getElementById('sidebar-toggle');
  const mobileNav = document.getElementById('mobile-nav');
  if (toggleBtn) toggleBtn.style.display = mobile ? 'flex' : 'none';
  if (mobileNav) mobileNav.style.display = mobile ? 'flex' : 'none';
}

// Sidebar drawer for mobile
function toggleMobileSidebar() {
  if (!isMobile()) return;
  const season = currentSeason;
  const sid = season === '2026' ? 'sidebar-2026' : 'sidebar-2025';
  const sidebar = document.getElementById(sid);
  const overlay = document.getElementById('sidebar-overlay');
  if (!sidebar) return;
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  // Show the right sidebar
  document.getElementById('sidebar-2025').style.display = '';
  document.getElementById('sidebar-2026').style.display = '';
}

function closeMobileSidebar() {
  ['sidebar-2025','sidebar-2026'].forEach(id => {
    document.getElementById(id)?.classList.remove('open');
  });
  document.getElementById('sidebar-overlay')?.classList.remove('open');
}

// Mobile nav button actions
function setMobileNavActive(id) {
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
}

function mobileNavRaces() {
  setMobileNavActive('mnb-races');
  switchSeason('2025');
  closeMobileSidebar();
}

function mobileNav2026() {
  setMobileNavActive('mnb-2026');
  switchSeason('2026');
  closeMobileSidebar();
}

function mobileNavCompare() {
  setMobileNavActive('mnb-compare');
  switchSeason('compare');
  closeMobileSidebar();
}

// Run on load and resize
window.addEventListener('resize', updateMobileUI);
updateMobileUI();
